services:
  - type: web
    name: mini-dify-backend
    runtime: node
    plan: free
    buildCommand: node -v && corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm -v && pnpm install --frozen-lockfile --prod=false && pnpm build:shared && pnpm build:backend
    startCommand: pnpm --filter @mini-dify/backend start
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: FRONTEND_ORIGIN
        sync: false
