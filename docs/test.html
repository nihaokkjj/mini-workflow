<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentForge - 低代码构建智能 Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Urbanist:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      @property --border-angle {
        syntax: "<angle>";
        initial-value: 0deg;
        inherits: false;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #0a0a0a;
        overflow-x: hidden;
      }

      .app {
        min-height: 100vh;
        background:
          radial-gradient(
            ellipse at 15% 40%,
            rgba(160, 104, 255, 0.28) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 85% 15%,
            rgba(66, 220, 219, 0.18) 0%,
            transparent 45%
          ),
          radial-gradient(
            ellipse at 70% 85%,
            rgba(120, 80, 200, 0.22) 0%,
            transparent 45%
          ),
          radial-gradient(
            ellipse at 40% 90%,
            rgba(160, 104, 255, 0.12) 0%,
            transparent 40%
          ),
          linear-gradient(
            135deg,
            #1a1230 0%,
            #15102a 25%,
            #0f1628 55%,
            #0a0a0a 100%
          );
        background-attachment: fixed;
        position: relative;
        display: flex;
        flex-direction: column;
      }

      /* Header */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 24px 64px;
        max-width: 1920px;
        margin: 0 auto;
        width: 100%;
        opacity: 0;
        transform: translateY(-20px);
        animation: fadeDown 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        z-index: 10;
      }

      @keyframes fadeDown {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 48px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }

      .brand-icon {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, #a068ff 0%, #42dcdb 100%);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .brand-icon::before {
        content: "";
        position: absolute;
        inset: 2px;
        background: #000;
        border-radius: 6px;
      }

      .brand-icon::after {
        content: "A";
        position: relative;
        color: #fff;
        font-family: "Urbanist", sans-serif;
        font-weight: 700;
        font-size: 16px;
        z-index: 1;
      }

      .brand-text {
        font-family: "Urbanist", sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -0.5px;
      }

      .brand-text span {
        color: #a068ff;
      }

      .nav-links {
        display: flex;
        gap: 32px;
      }

      .nav-link {
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        position: relative;
        padding-bottom: 4px;
        transition: color 0.3s;
      }

      .nav-link:hover {
        color: #ffffff;
      }

      .nav-link::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, #a068ff, #42dcdb);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.3s ease;
      }

      .nav-link:hover::after {
        transform: scaleX(1);
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 24px;
      }

      .login-link {
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        transition: color 0.3s;
      }

      .login-link:hover {
        color: #ffffff;
      }

      .btn-border-wrap {
        position: relative;
        display: inline-block;
        padding: 3px;
        border-radius: 50px;
        overflow: visible;
      }

      .btn-border-wrap::before {
        content: "";
        position: absolute;
        inset: -3px;
        border-radius: 50px;
        padding: 3px;
        background: conic-gradient(
          from var(--border-angle),
          #a068ff,
          #42dcdb,
          #a068ff,
          #42dcdb,
          #a068ff
        );
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        animation: rotateBorder 3s linear infinite;
        pointer-events: none;
      }

      @keyframes rotateBorder {
        to {
          --border-angle: 360deg;
        }
      }

      .btn {
        position: relative;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-weight: 500;
        overflow: hidden;
        z-index: 1;
        transition: color 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .btn-join {
        background: #000000;
        color: #ffffff;
        padding: 12px 26px;
        font-size: 15px;
      }

      .btn::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #a068ff, #42dcdb);
        z-index: -1;
        transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .btn-join::after {
        transform: translateX(-100%);
      }

      .btn-join:hover::after {
        transform: translateX(0);
      }

      .btn:hover {
        color: #ffffff;
      }

      /* Hero */
      .hero {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 1920px;
        margin: 0 auto;
        width: 100%;
        padding: 0 64px;
        position: relative;
        gap: 60px;
        min-height: 0;
      }

      /* Login Form */
      .hero-left {
        flex: 0 1 460px;
        padding-top: 20px;
        opacity: 0;
        transform: translateY(40px);
        animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        z-index: 10;
      }

      @keyframes fadeUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .login-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 44px 40px;
        box-shadow:
          0 25px 50px -12px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .login-title {
        font-family: "Urbanist", sans-serif;
        font-size: 32px;
        font-weight: 700;
        color: #ffffff;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }

      .login-subtitle {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 32px;
        font-weight: 400;
        line-height: 1.5;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      .form-input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.3);
        color: #ffffff;
        font-size: 15px;
        font-family: "Inter", sans-serif;
        transition: all 0.3s ease;
        outline: none;
      }

      .form-input::placeholder {
        color: rgba(255, 255, 255, 0.25);
      }

      .form-input:focus {
        border-color: #a068ff;
        background: rgba(0, 0, 0, 0.5);
        box-shadow: 0 0 0 4px rgba(160, 104, 255, 0.1);
      }

      .form-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 28px;
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }

      .remember-me input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: #a068ff;
        cursor: pointer;
      }

      .remember-me span {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
      }

      .forgot-link {
        font-size: 13px;
        color: #a068ff;
        text-decoration: none;
        font-weight: 500;
        transition: opacity 0.3s;
      }

      .forgot-link:hover {
        opacity: 0.8;
        text-decoration: underline;
      }

      .btn-login {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #a068ff 0%, #42dcdb 100%);
        color: #ffffff;
        font-size: 15px;
        font-weight: 600;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        letter-spacing: 0.3px;
      }

      .btn-login:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 30px rgba(160, 104, 255, 0.3);
        filter: brightness(1.1);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 24px 0;
        color: rgba(255, 255, 255, 0.3);
        font-size: 12px;
        letter-spacing: 0.5px;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
      }

      .social-login {
        display: flex;
        gap: 12px;
      }

      .social-btn {
        flex: 1;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.03);
        color: rgba(255, 255, 255, 0.8);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .social-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        color: #ffffff;
      }

      .signup-text {
        text-align: center;
        margin-top: 24px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.4);
      }

      .signup-text a {
        color: #42dcdb;
        text-decoration: none;
        font-weight: 600;
        transition: opacity 0.3s;
      }

      .signup-text a:hover {
        opacity: 0.8;
        text-decoration: underline;
      }

      /* Hero Right - Planet Orbits */
      .hero-right {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        height: 720px;
        width: 720px;
        opacity: 0;
        transform: scale(0.85);
        animation: scaleIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
      }

      @keyframes scaleIn {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .orbits-container {
        position: relative;
        width: 797px;
        height: 797px;
        display: grid;
        place-items: center;
      }

      .orbit {
        grid-area: 1 / 1;
        position: relative;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .orbit-border {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        padding: 1px;
        background: linear-gradient(
          180deg,
          rgba(160, 104, 255, 0) 0%,
          rgba(160, 104, 255, 0.6) 43%,
          rgba(66, 220, 219, 0.6) 57%,
          rgba(66, 220, 219, 0) 100%
        );
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      .orbit-1 {
        width: 353px;
        height: 353px;
        animation: spinLeft 30s linear infinite;
      }
      .orbit-2 {
        width: 501px;
        height: 501px;
        animation: spinRight 40s linear infinite;
      }
      .orbit-3 {
        width: 649px;
        height: 649px;
        animation: spinRight 50s linear infinite;
      }
      .orbit-4 {
        width: 797px;
        height: 797px;
        animation: spinLeft 60s linear infinite;
      }

      @keyframes spinLeft {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(-360deg);
        }
      }

      @keyframes spinRight {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .orbit-item {
        position: absolute;
        top: 50%;
        left: 50%;
      }

      .planet {
        position: relative;
        border-radius: 50%;
        transform-origin: center;
        opacity: 0;
        animation: planetFlyIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        box-shadow:
          inset -6px -6px 16px rgba(0, 0, 0, 0.5),
          0 0 25px var(--glow-color);
      }

      @keyframes planetFlyIn {
        from {
          opacity: 0;
          transform: scale(0.3) rotate(-180deg);
          filter: blur(10px);
        }
        to {
          opacity: 1;
          transform: scale(1) rotate(0deg);
          filter: blur(0);
        }
      }

      .planet-purple {
        background: radial-gradient(
          circle at 35% 35%,
          #c49aff,
          #6b3fa0,
          #2a1a4a
        );
        --glow-color: rgba(160, 104, 255, 0.4);
      }

      .planet-cyan {
        background: radial-gradient(
          circle at 35% 35%,
          #66ffff,
          #2abfc0,
          #1a7a7a
        );
        --glow-color: rgba(66, 220, 219, 0.4);
      }

      .planet-pink {
        background: radial-gradient(
          circle at 35% 35%,
          #ffb3d9,
          #d4669a,
          #8b3a5c
        );
        --glow-color: rgba(255, 150, 200, 0.4);
      }

      .planet-blue {
        background: radial-gradient(
          circle at 35% 35%,
          #66c2ff,
          #2a7abf,
          #1a4a7a
        );
        --glow-color: rgba(100, 180, 255, 0.4);
      }

      .planet-orange {
        background: radial-gradient(
          circle at 35% 35%,
          #ffb366,
          #d47a2a,
          #8b4a1a
        );
        --glow-color: rgba(255, 160, 80, 0.4);
      }

      .planet-teal {
        background: radial-gradient(
          circle at 35% 35%,
          #66ffe5,
          #2abfa0,
          #1a7a66
        );
        --glow-color: rgba(100, 255, 220, 0.4);
      }

      .planet-red {
        background: radial-gradient(
          circle at 35% 35%,
          #ff6666,
          #bf2a2a,
          #7a1a1a
        );
        --glow-color: rgba(255, 100, 100, 0.4);
      }

      .planet-green {
        background: radial-gradient(
          circle at 35% 35%,
          #66ff99,
          #2abf5a,
          #1a7a3a
        );
        --glow-color: rgba(100, 255, 150, 0.4);
      }

      .planet-yellow {
        background: radial-gradient(
          circle at 35% 35%,
          #ffe566,
          #d4a017,
          #8b6914
        );
        --glow-color: rgba(255, 220, 100, 0.4);
      }

      .planet-ring {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.12);
        pointer-events: none;
      }

      /* Center GitHub Icon */
      .center-hub {
        grid-area: 1 / 1;
        position: relative;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 80px;
        height: 80px;
        opacity: 0;
        transform: scale(0.8);
        animation: hubAppear 1s cubic-bezier(0.22, 1, 0.36, 1) 2.5s forwards;
      }

      @keyframes hubAppear {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .github-link {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        cursor: pointer;
        text-decoration: none;
        position: relative;
        overflow: hidden;
      }

      .github-link::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        padding: 2px;
        background: linear-gradient(135deg, #a068ff, #42dcdb);
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      .github-link:hover::before {
        opacity: 1;
      }

      .github-link:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: scale(1.1);
        box-shadow: 0 0 40px rgba(160, 104, 255, 0.2);
      }

      .github-icon {
        width: 28px;
        height: 28px;
        fill: rgba(255, 255, 255, 0.8);
        transition: fill 0.3s ease;
        position: relative;
        z-index: 1;
      }

      .github-link:hover .github-icon {
        fill: #ffffff;
      }

      .github-tooltip {
        position: absolute;
        bottom: -36px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        font-size: 12px;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: 8px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(8px);
      }

      .github-tooltip::before {
        content: "";
        position: absolute;
        top: -4px;
        left: 50%;
        transform: translateX(-50%);
        width: 8px;
        height: 8px;
        background: rgba(0, 0, 0, 0.8);
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        transform: translateX(-50%) rotate(45deg);
      }

      .github-link:hover .github-tooltip {
        opacity: 1;
        bottom: -40px;
      }

      /* Responsive */
      @media (max-width: 1280px) {
        .orbits-container {
          transform: scale(0.85);
        }
      }

      @media (max-width: 1024px) {
        .hero {
          flex-direction: column;
          padding: 40px;
          gap: 40px;
        }
        .hero-left {
          flex: none;
          width: 100%;
          max-width: 480px;
          margin: 0 auto;
        }
        .hero-right {
          height: 600px;
          width: 100%;
        }
        .orbits-container {
          transform: scale(0.7);
        }
        .nav-links {
          gap: 20px;
        }
        .header {
          padding: 24px 40px;
        }
      }

      @media (max-width: 768px) {
        .nav-links {
          display: none;
        }
        .hero-right {
          height: 450px;
        }
        .orbits-container {
          transform: scale(0.5);
        }
        .header {
          padding: 20px 24px;
        }
        .hero {
          padding: 20px;
        }
        .login-card {
          padding: 36px 28px;
        }
        .center-hub {
          width: 60px;
          height: 60px;
        }
        .github-link {
          width: 48px;
          height: 48px;
        }
        .github-icon {
          width: 22px;
          height: 22px;
        }
      }

      @media (max-width: 480px) {
        .hero-right {
          height: 360px;
        }
        .orbits-container {
          transform: scale(0.4);
        }
        .login-title {
          font-size: 28px;
        }
        .login-card {
          padding: 28px 20px;
        }
        .brand-text {
          font-size: 18px;
        }
        .center-hub {
          width: 50px;
          height: 50px;
        }
        .github-link {
          width: 40px;
          height: 40px;
        }
        .github-icon {
          width: 20px;
          height: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-left">
          <a href="#" class="brand">
            <div class="brand-icon"></div>
            <div class="brand-text">Agent<span>Forge</span></div>
          </a>
          <nav class="nav-links">
            <a href="#" class="nav-link">产品功能</a>
            <a href="#" class="nav-link">模板市场</a>
            <a href="#" class="nav-link">文档</a>
            <a href="#" class="nav-link">定价</a>
          </nav>
        </div>
        <div class="header-right">
          <a href="#" class="login-link">登录</a>
          <div class="btn-border-wrap">
            <button class="btn btn-join">免费试用</button>
          </div>
        </div>
      </header>

      <section class="hero">
        <div class="hero-left">
          <div class="login-card">
            <h1 class="login-title">欢迎回来</h1>

                  id="email"
                  class="form-input"
                  placeholder="name@company.com"

                  id="password"
                  class="form-input"

                  <input type="checkbox" checked />

                <a href="#" class="forgot-link">忘记密码？</a>
